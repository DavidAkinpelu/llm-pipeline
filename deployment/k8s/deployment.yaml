apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-pipeline
  labels:
    app.kubernetes.io/name: llm-pipeline
    app.kubernetes.io/component: serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-pipeline
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-pipeline
        app.kubernetes.io/component: serving
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: server
          image: llm-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LLM_PIPELINE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: llm-pipeline-config
                  key: model_path
          envFrom:
            - configMapRef:
                name: llm-pipeline-config
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: model-weights
              mountPath: /weights
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: llm-pipeline-weights
